workflows:
  ios-build:
    name: iOS Flutter Build
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      flutter: stable
      xcode: latest
      groups:
        - ios_signing

    scripts:
      - name: Get Flutter packages
        script: flutter pub get

      - name: Install certificate
        script: |
          echo $CM_CERTIFICATE | base64 --decode > /tmp/ios_dev.p12
          keychain initialize
          keychain add-certificates --certificate /tmp/ios_dev.p12 --certificate-password $CM_CERTIFICATE_PASSWORD

      - name: Build signed iOS app
        script: flutter build ipa --release

    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/archive/*.xcarchive
