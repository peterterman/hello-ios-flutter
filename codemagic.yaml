workflows:
  ios-build:
    name: iOS Flutter Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Build iOS app
        script: flutter build ipa --release 
    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/archive/*.xcarchive
